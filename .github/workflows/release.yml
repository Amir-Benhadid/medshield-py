name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python

      # The following steps only run if a release pull request was merged.
      - name: Checkout code
        uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Setup Python
        uses: actions/setup-python@v5
        if: ${{ steps.release.outputs.release_created }}
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install build twine
        if: ${{ steps.release.outputs.release_created }}

      - name: Build package
        run: python -m build
        if: ${{ steps.release.outputs.release_created }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ steps.release.outputs.release_created }}
        with:
          skip-existing: true
